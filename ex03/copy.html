<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Skills</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
      <ul>
          <li>
            <h2>Frontend</h2>
            <label for="progress-bar">HTML5</label>
            <progress class="progress-bar html5" value="80" max="100"><span>80%</span></progress>
            <label for="progress-bar">CSS3</label>
            <progress class="progress-bar css3" value="60" max="100"><span>60%</span></progress>
            <label for="progress-bar">jQUERY</label>
            <progress class="progress-bar jquery" value="50" max="100"><span>50%</span></progress>
        </li>
        <li>
            <h2>Backend</h2>
            <label for="progress-bar">Python</label>
            <progress class="progress-bar python" value="75" max="100"><span>75%</span></progress>
            <label for="progress-bar">PHP</label>
            <progress class="progress-bar php" value="65" max="100"><span>65%</span></progress>
            <label for="progress-bar">Node.js</label>
            <progress class="progress-bar node-js" value="35" max="100"><span>35%</span></progress>
        </li>
    </ul>
  </body>
</html>
