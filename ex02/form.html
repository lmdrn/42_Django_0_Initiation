<!DOCTYPE html>
<html>
<body>

<h1>Formulaire d’envoi d’emails</h1>

<p>Super formulaire pour 42.</p>

<form action="/action_page.php">
  <label for="fname">First name:</label>
  <input type="text" id="firstname" name="fname"><br><br>
  <label for="name">Name:</label>
  <input type="text" id="name" name="name"><br><br>
  <label for="age">Age:</label>
  <input type="number" id="age" name="age" min="1" max="100"><br><br>
  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br><br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email"><br><br>
  <label for="name">Student at 42?</label>
  <input type="checkbox" id="student" name="oui" value="oui">
  <label for="oui"> oui</label><br>
  <input type="checkbox" id="not_student" name="non" value="non">
  <label for="non"> non</label><br><br>
  <label for="gender">Gender:</label>
  <input type="radio" id="gender_male" name="gender" value="male">
  <label for="male">Male</label><br>
  <input type="radio" id="gender_female" name="gender" value="female">
  <label for="female">Female</label><br>
  <input type="radio" id="gender_other" name="gender" value="other">
  <label for="other">Other</label><br><br>
  <button type="button" onclick="displayFormContents();">Submit</button>
</form>
<script src="popup.js"></script>
</body>
</html>
